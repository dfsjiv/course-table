name: course_table
description: Local weekly timetable importer for legacy Yiban XLS files.
publish_to: none
version: 0.1.0+1

environment:
  sdk: ">=3.4.0 <4.0.0"

dependencies:
  flutter:
    sdk: flutter
  file_picker: ^10.1.9
  ffi: ^2.1.4
  flutter_local_notifications: ^22.0.1
  flutter_timezone: ^5.0.1
  shared_preferences: ^2.5.3
  timezone: ^0.11.0

dev_dependencies:
  flutter_test:
    sdk: flutter
  flutter_lints: ^5.0.0

flutter:
  uses-material-design: true
